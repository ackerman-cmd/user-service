spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://${db.host}:${db.port}/${db.name}?currentSchema=user_service
    username: ${db.username}
    password: ${db.password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: user_service
        format_sql: true
    show-sql: false
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: user_service

  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      password: ${redis.password}
      timeout: 5000ms

  kafka:
    bootstrap-servers: ${kafka.bootstrap-servers}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  front-url: ${FRONT_BASE_URL:http://localhost:3000}
  kafka:
    topics:
      email-verification: email-verification
      user-sync: user-sync
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}
    max-retries: ${OUTBOX_MAX_RETRIES:5}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    try-it-out-enabled: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        startup:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true